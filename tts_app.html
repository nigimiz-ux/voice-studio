<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Studio V3 (Live Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>

<body class="bg-[#131417] text-gray-200 font-sans p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-7xl w-full mx-auto flex flex-col lg:flex-row gap-6">

        <div class="lg:w-7/12 bg-[#1c1d21] p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col h-[850px]">
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-3xl font-extrabold text-white">Voice Studio <span class="text-indigo-500">V3</span></h1>

                <div id="authArea"
                    class="flex items-center gap-3 bg-[#25262b] px-3 py-1.5 rounded-full border border-gray-700">
                    <button id="btnLogin" onclick="signInWithGoogle()"
                        class="flex items-center gap-2 text-sm text-gray-300 hover:text-white transition">
                        <img src="https://www.google.com/images/branding/product/2x/googleg_32dp.png" class="w-5 h-5"
                            alt="G"> Google 로그인
                    </button>
                    <div id="userInfo" class="flex items-center gap-2 hidden">
                        <img id="userPhoto" src="" class="w-8 h-8 rounded-full border-2 border-indigo-500"
                            alt="Profile">
                        <span id="userName" class="text-xs text-gray-300"></span>
                        <button onclick="signOut()"
                            class="text-xs text-rose-400 hover:text-rose-300 ml-1">[로그아웃]</button>
                    </div>
                </div>
            </div>
            <p class="text-gray-400 mb-6 text-sm">Personal English Voice Tutor (Live & Secured)</p>

            <div class="mb-5 flex-1 flex flex-col">
                <label class="block text-sm font-bold text-gray-400 mb-2 hover:text-indigo-400 cursor-pointer"
                    onclick="document.getElementById('textInput').value=''">대본 (Script) <span
                        class="text-xs font-normal text-gray-600">[비우기 클릭]</span></label>
                <textarea id="textInput"
                    class="w-full flex-1 bg-[#25262b] border border-gray-700 rounded-lg p-4 text-gray-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none transition text-lg leading-relaxed"
                    placeholder="우측 뉴스를 요약 듣기 하거나, 기사 전문을 이곳에 붙여넣으세요..."></textarea>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-400 mb-2">음성 선택 (Voice)</label>
                <select id="voiceSelect"
                    class="w-full bg-[#25262b] border border-gray-700 rounded-lg p-3 text-gray-200 focus:outline-none focus:border-indigo-500 transition appearance-none cursor-pointer">
                    <option value="">목소리를 불러오는 중...</option>
                </select>
            </div>

            <div class="mb-6 bg-[#25262b] p-4 rounded-lg border border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-bold text-gray-400">낭독 속도</label>
                    <span class="text-sm font-bold text-indigo-400"><span id="rateValue">1.0</span>x</span>
                </div>
                <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.1" value="1"
                    class="w-full accent-indigo-500 cursor-pointer">
            </div>

            <div class="flex gap-3 mt-auto">
                <button onclick="speakText()"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-lg shadow-lg shadow-indigo-500/20 transition duration-200 flex justify-center items-center gap-2 text-lg">
                    ▶️ 음성 듣기
                </button>
                <button onclick="stopText()"
                    class="px-8 bg-rose-500/10 hover:bg-rose-500/20 text-rose-500 border border-rose-500/20 font-bold py-4 rounded-lg transition duration-200 flex justify-center items-center text-lg">
                    ⏹️ 정지
                </button>
            </div>
        </div>

        <div class="lg:w-5/12 flex flex-col gap-6 h-[850px]">

            <div class="bg-[#1c1d21] p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col h-[55%]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-white">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> Today's Global News
                    </h2>
                    <button onclick="loadLiveNews()"
                        class="flex items-center gap-1.5 text-xs text-gray-400 bg-[#25262b] hover:bg-gray-700 px-3 py-1.5 rounded-full border border-gray-700 transition">
                        🔄 뉴스 새로고침
                    </button>
                </div>

                <div id="newsList" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                    <p class="text-xs text-gray-500 text-center mt-6">뉴스를 불러오는 중... 📡</p>
                </div>
            </div>

            <div id="memoArea"
                class="bg-[#1c1d21] p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col h-[45%] opacity-40 transition-opacity duration-300 relative">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-white">📌 Study Memos</h2>
                    <span
                        class="text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20">나만의
                        비밀 메모</span>
                </div>

                <div id="memoOverlay"
                    class="absolute inset-x-6 inset-y-16 flex flex-col items-center justify-center bg-[#1c1d21]/95 rounded-2xl z-10 text-center">
                    <p class="text-2xl mb-2">🔒</p>
                    <p class="text-sm font-bold text-gray-300 mb-3">메모장을 사용하시려면</p>
                    <button onclick="signInWithGoogle()"
                        class="flex items-center gap-2 bg-[#25262b] hover:bg-gray-700 border border-gray-700 text-white text-xs font-bold px-4 py-2 rounded-full transition">
                        <img src="https://www.google.com/images/branding/product/2x/googleg_32dp.png" class="w-4 h-4"
                            alt="G"> 구글 로그인
                    </button>
                </div>

                <div class="flex gap-2 mb-4 relative z-0">
                    <input type="text" id="memoInput"
                        class="flex-1 bg-[#25262b] border border-gray-700 rounded-lg p-2 text-sm text-gray-200 focus:outline-none focus:border-emerald-500 disabled:opacity-50"
                        placeholder="공부할 표현이나 단어를 메모하세요..." onkeypress="if(event.keyCode==13) addMemo()" disabled>
                    <button id="btnMemoAdd" onclick="addMemo()"
                        class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg text-sm transition disabled:opacity-50"
                        disabled>추가</button>
                </div>

                <div id="memoList" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar relative z-0">
                    <p class="text-xs text-gray-500 text-center mt-4">로그인하면 메모가 뜹니다.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // 1. 파이어베이스 인증 및 DB 설정
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDcQNHIUYSbJe8qnc4EqzRpGmQ4qufz70k",
            authDomain: "aje-executive-db.firebaseapp.com",
            databaseURL: "https://aje-executive-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aje-executive-db",
            storageBucket: "aje-executive-db.firebasestorage.app",
            messagingSenderId: "25421275822",
            appId: "1:25421275822:web:8de86422d025e2cd25c33f"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let memoRef = null;

        // ==========================================
        // 2. 구글 로그인 시스템 (원상 복구!)
        // ==========================================
        function signInWithGoogle() {
            auth.signInWithPopup(provider).catch(error => {
                alert("로그인 차단됨: 브라우저 팝업 차단을 해제해주세요! (" + error.message + ")");
            });
        }
        function signOut() { auth.signOut(); }

        auth.onAuthStateChanged((user) => {
            const btnLogin = document.getElementById('btnLogin');
            const userInfo = document.getElementById('userInfo');
            const memoArea = document.getElementById('memoArea');
            const memoOverlay = document.getElementById('memoOverlay');
            const memoInput = document.getElementById('memoInput');
            const btnMemoAdd = document.getElementById('btnMemoAdd');

            if (user) {
                // 로그인 완료 시
                currentUser = user;
                btnLogin.classList.add('hidden');
                userInfo.classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
                document.getElementById('userName').textContent = user.displayName;

                // 가림막 치우고 활성화
                memoArea.classList.remove('opacity-40');
                memoOverlay.classList.add('hidden');
                memoInput.disabled = false;
                btnMemoAdd.disabled = false;

                loadUserMemos(user.uid);
            } else {
                // 로그아웃 시
                currentUser = null;
                if (memoRef) memoRef.off();
                memoRef = null;

                btnLogin.classList.remove('hidden');
                userInfo.classList.add('hidden');

                // 가림막 다시 덮기
                memoArea.classList.add('opacity-40');
                memoOverlay.classList.remove('hidden');
                memoInput.disabled = true;
                btnMemoAdd.disabled = true;
                document.getElementById('memoList').innerHTML = '<p class="text-xs text-gray-500 text-center mt-4">로그인하면 나만의 학습 메모장이 열립니다.</p>';
            }
        });

        // ==========================================
        // 3. 파이어베이스 학습 메모장 로직
        // ==========================================
        function addMemo() {
            if (!currentUser || !memoRef) return;
            const input = document.getElementById('memoInput');
            const text = input.value.trim();
            if (!text) return;
            memoRef.push({ text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
            input.value = '';
        }

        function loadUserMemos(uid) {
            memoRef = database.ref(`study_memos/${uid}`);
            memoRef.on('value', (snapshot) => {
                const memoList = document.getElementById('memoList');
                memoList.innerHTML = '';
                if (!snapshot.exists()) {
                    memoList.innerHTML = '<p class="text-xs text-gray-500 text-center mt-4">저장된 메모가 없습니다. 첫 메모를 입력하세요!</p>';
                    return;
                }
                const memos = [];
                snapshot.forEach(child => { memos.push({ id: child.key, ...child.val() }); });
                memos.reverse();
                memos.forEach(memo => {
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center bg-[#25262b] p-3 rounded-lg border border-gray-700 hover:border-gray-500 transition group";
                    item.innerHTML = `
                        <span class="text-sm text-gray-300 pr-2">${memo.text}</span>
                        <button onclick="deleteMemo('${memo.id}')" class="text-xs bg-gray-700 hover:bg-rose-500 text-gray-300 hover:text-white px-2 py-1 rounded transition opacity-0 group-hover:opacity-100">
                            완료(삭제)
                        </button>
                    `;
                    memoList.appendChild(item);
                });
            });
        }
        function deleteMemo(id) { if (memoRef) memoRef.child(id).remove(); }

        // ==========================================
        // 4. 실시간 라이브 BBC 뉴스 연동
        // ==========================================
        async function loadLiveNews() {
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = '<p class="text-xs text-indigo-400 text-center mt-6 animate-pulse">실시간 뉴스를 불러오는 중... 📡</p>';

            const refreshBtn = document.querySelector('button[onclick="loadLiveNews()"]');
            if (refreshBtn) refreshBtn.innerHTML = '✨ 로딩 중...';

            const rssUrl = 'http://feeds.bbci.co.uk/news/rss.xml';
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === 'ok') {
                    newsList.innerHTML = '';
                    const shuffled = data.items.sort(() => 0.5 - Math.random()).slice(0, 5);

                    shuffled.forEach((item, i) => {
                        const tempDiv = document.createElement("div");
                        tempDiv.innerHTML = item.description;
                        const cleanDesc = tempDiv.textContent || tempDiv.innerText || "설명이 없습니다.";

                        let cat = 'News';
                        if (item.link.includes('/technology')) cat = 'Tech';
                        else if (item.link.includes('/business')) cat = 'Biz';
                        else if (item.link.includes('/science')) cat = 'Science';
                        else if (item.link.includes('/politics')) cat = 'Politics';

                        const card = document.createElement('div');
                        card.className = "bg-[#25262b] p-4 rounded-lg border border-gray-700 transition group flex flex-col justify-between";
                        card.innerHTML = `
                            <div>
                                <div class="flex justify-between items-center mb-1.5">
                                    <h3 class="font-bold text-sm text-gray-200 group-hover:text-indigo-400 line-clamp-2" id="liveTitle_${i}">${item.title}</h3>
                                    <span class="text-[10px] text-indigo-300 bg-indigo-500/10 px-1.5 py-0.5 rounded flex-shrink-0 ml-2">${cat}</span>
                                </div>
                                <p class="text-xs text-gray-400 mb-3 line-clamp-2" id="liveDesc_${i}">${cleanDesc}</p>
                            </div>
                            <div class="flex gap-2 relative z-0 mt-2">
                                <button onclick="loadToEditor('liveTitle_${i}', 'liveDesc_${i}')" class="flex-1 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 text-xs font-bold py-2 rounded transition">🔊 요약 듣기</button>
                                <button onclick="window.open('${item.link}', '_blank')" class="flex-1 bg-gray-700/50 hover:bg-gray-700 text-gray-300 text-xs font-bold py-2 rounded transition">🔗 전문 보기</button>
                            </div>
                        `;
                        newsList.appendChild(card);
                    });
                }
            } catch (error) {
                console.error("뉴스 로딩 에러:", error);
                newsList.innerHTML = '<p class="text-xs text-rose-500 text-center mt-6">뉴스 피드를 읽어올 수 없습니다.</p>';
            }

            if (refreshBtn) setTimeout(() => refreshBtn.innerHTML = '🔄 뉴스 새로고침', 500);
        }
        loadLiveNews(); // 시작할 때 뉴스 불러오기

        // ==========================================
        // 5. 음성 합성(TTS) 엔진 (구글 우선 세팅)
        // ==========================================
        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voiceSelect');
        const textInput = document.getElementById('textInput');
        const rateSlider = document.getElementById('rateSlider');
        let voices = [];

        function populateVoiceList() {
            voices = synth.getVoices().filter(voice => voice.lang.includes('en'));
            voiceSelect.innerHTML = '';
            if (voices.length === 0) {
                voiceSelect.innerHTML = '<option>음성 데이터를 불러올 수 없습니다.</option>';
                return;
            }
            voices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = i;
                voiceSelect.appendChild(option);
            });
            // Google US English 1순위 탐색
            let bestIndex = voices.findIndex(v => v.name.includes('Google') && v.lang.includes('en-US'));
            if (bestIndex === -1) bestIndex = voices.findIndex(v => v.lang.includes('en-US'));
            if (bestIndex !== -1) voiceSelect.selectedIndex = bestIndex;
        }
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

        rateSlider.oninput = function () { document.getElementById('rateValue').textContent = Number(this.value).toFixed(1); }

        function loadToEditor(titleId, descId) {
            textInput.value = `${document.getElementById(titleId).innerText}.\n\n${document.getElementById(descId).innerText}`;
            textInput.classList.add('ring-2', 'ring-indigo-500');
            setTimeout(() => textInput.classList.remove('ring-2', 'ring-indigo-500'), 300);
        }

        function speakText() {
            if (synth.speaking) synth.cancel();
            if (textInput.value !== '') {
                const utterThis = new SpeechSynthesisUtterance(textInput.value);
                const selectedOption = voiceSelect.selectedOptions[0]?.value;
                if (selectedOption !== undefined) utterThis.voice = voices[selectedOption];
                utterThis.rate = rateSlider.value;
                synth.speak(utterThis);
            }
        }
        function stopText() { synth.cancel(); }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #373A40;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #4f46e5;
        }

        input[type=range]::-webkit-slider-thumb {
            border-radius: 100px;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.5);
        }
    </style>
</body>

</html>
